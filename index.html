<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>바이브 코딩 용어집</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #273549;
    --border: #334155;
    --accent: #38bdf8;
    --accent2: #818cf8;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --tag-기초: #0ea5e9;
    --tag-도구: #a78bfa;
    --tag-개발: #34d399;
    --tag-AI: #fb923c;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 20px 20px;
    text-align: center;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(10px);
  }
  header h1 {
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    font-weight: 800;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .subtitle { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }
  .stat-bar {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    margin-top: 12px;
  }
  .stat-chip {
    font-size: 0.72rem; padding: 3px 10px; border-radius: 20px;
    border: 1px solid var(--border); color: var(--text-muted); background: var(--surface);
  }
  .stat-chip span { color: var(--accent); font-weight: 700; }

  /* CONTROLS */
  .controls {
    max-width: 760px; margin: 16px auto 0; padding: 0 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .search-wrap { position: relative; }
  .search-wrap input {
    width: 100%; padding: 11px 16px 11px 42px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 0.9rem;
    outline: none; transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 1rem; pointer-events: none;
  }

  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-muted); font-size: 0.8rem;
    cursor: pointer; transition: all .18s; white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0f172a; font-weight: 700; }
  .filter-btn.cat-기초.active { background: var(--tag-기초); border-color: var(--tag-기초); }
  .filter-btn.cat-도구.active { background: var(--tag-도구); border-color: var(--tag-도구); }
  .filter-btn.cat-개발.active { background: var(--tag-개발); border-color: var(--tag-개발); }
  .filter-btn.cat-AI.active  { background: var(--tag-AI);   border-color: var(--tag-AI);   }

  .sort-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .sort-label { font-size: 0.75rem; color: var(--text-muted); }
  .sort-btn {
    padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-muted); font-size: 0.78rem;
    cursor: pointer; transition: all .18s;
  }
  .sort-btn.active { border-color: var(--accent2); color: var(--accent2); }

  /* RESULTS COUNT */
  .results-info {
    max-width: 760px; margin: 10px auto 0; padding: 0 16px;
    font-size: 0.78rem; color: var(--text-muted);
  }

  /* GRID */
  .grid {
    max-width: 760px; margin: 12px auto 0; padding: 0 16px;
    display: grid; gap: 10px;
  }

  /* CARD */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
    transition: border-color .2s, transform .15s;
    cursor: default;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card-top { display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
  .term-ko { font-size: 1rem; font-weight: 700; color: var(--text); flex: 1; min-width: 120px; }
  .term-en { font-size: 0.8rem; color: var(--text-muted); margin-top: 1px; font-family: monospace; }
  .cat-tag {
    font-size: 0.68rem; padding: 3px 9px; border-radius: 20px;
    font-weight: 700; white-space: nowrap; margin-top: 2px;
  }
  .cat-기초 { background: rgba(14,165,233,.15); color: var(--tag-기초); border: 1px solid rgba(14,165,233,.3); }
  .cat-도구 { background: rgba(167,139,250,.15); color: var(--tag-도구); border: 1px solid rgba(167,139,250,.3); }
  .cat-개발 { background: rgba(52,211,153,.15); color: var(--tag-개발); border: 1px solid rgba(52,211,153,.3); }
  .cat-AI   { background: rgba(251,146,60,.15);  color: var(--tag-AI);   border: 1px solid rgba(251,146,60,.3);  }

  .desc { font-size: 0.84rem; color: var(--text-muted); margin-top: 8px; line-height: 1.6; }

  /* ADD BUTTON */
  .fab {
    position: fixed; bottom: 24px; right: 20px;
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: #0f172a; font-size: 1.5rem; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 20px rgba(56,189,248,.4);
    display: flex; align-items: center; justify-content: center;
    transition: transform .2s;
  }
  .fab:hover { transform: scale(1.1); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7); z-index: 200;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px; width: 100%; max-width: 480px;
  }
  .modal h2 { font-size: 1rem; margin-bottom: 16px; color: var(--accent); }
  .modal label { font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 4px; }
  .modal input, .modal textarea, .modal select {
    width: 100%; padding: 9px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 0.88rem;
    outline: none; margin-bottom: 12px;
  }
  .modal textarea { min-height: 80px; resize: vertical; font-family: inherit; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel {
    padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); cursor: pointer; font-size: 0.85rem;
  }
  .btn-save {
    padding: 8px 18px; border-radius: 8px; border: none;
    background: var(--accent); color: #0f172a; cursor: pointer;
    font-size: 0.85rem; font-weight: 700;
  }

  /* EMPTY */
  .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 0.9rem; }

  /* NEW BADGE */
  .new-badge {
    font-size: 0.6rem; background: #fb923c; color: #0f172a;
    padding: 1px 6px; border-radius: 20px; font-weight: 800; margin-left: 4px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<header>
  <h1>🧑‍💻 바이브 코딩 용어집</h1>
  <div class="subtitle">AI 활용 개발 · IT 필수 용어 사전</div>
  <div class="stat-bar" id="statBar"></div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="용어 검색 (한글 또는 영문)..." oninput="render()">
  </div>
  <div class="filter-row" id="filterRow"></div>
  <div class="sort-row">
    <span class="sort-label">정렬:</span>
    <button class="sort-btn active" onclick="setSort('default')" id="sort-default">기본순</button>
    <button class="sort-btn" onclick="setSort('ko')" id="sort-ko">한글 가나다순</button>
    <button class="sort-btn" onclick="setSort('en')" id="sort-en">영문 ABC순</button>
  </div>
</div>

<div class="results-info" id="resultsInfo"></div>
<div class="grid" id="grid"></div>

<button class="fab" title="새 용어 추가" onclick="openModal()">+</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>➕ 새 용어 추가</h2>
    <label>용어 (한글)</label>
    <input type="text" id="f-ko" placeholder="예: 버그">
    <label>원어 / 영문 (선택)</label>
    <input type="text" id="f-en" placeholder="예: Bug">
    <label>설명</label>
    <textarea id="f-desc" placeholder="설명을 입력하세요..."></textarea>
    <label>카테고리</label>
    <select id="f-cat">
      <option value="기초">기초</option>
      <option value="도구">도구</option>
      <option value="개발">개발</option>
      <option value="AI">AI</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="addTerm()">저장</button>
    </div>
  </div>
</div>

<script>
// ─── DEFAULT DATA ────────────────────────────────────────────────────────────
const DEFAULT_TERMS = [
  // ════ 기초 ════
  {ko:"바이브 코딩",en:"Vibe Coding",cat:"기초",desc:"AI에게 원하는 것을 자연어로 설명하고, 결과물을 직접 검토하지 않고 실행 여부로만 판단하는 개발 방식. Andrej Karpathy가 2025년 초 제안한 개념."},
  {ko:"프롬프트",en:"Prompt",cat:"기초",desc:"AI에게 전달하는 명령이나 질문. '무엇을 만들어줘', '이 코드를 수정해줘'처럼 작업 지시 문장 전체를 가리킴."},
  {ko:"컨텍스트",en:"Context",cat:"기초",desc:"AI가 현재 대화에서 참고하는 모든 정보. 이전 대화 내용, 업로드한 파일, 시스템 프롬프트 등이 포함됨."},
  {ko:"토큰",en:"Token",cat:"기초",desc:"AI가 텍스트를 처리하는 최소 단위. 영어는 단어, 한국어는 음절 또는 형태소 단위로 분리됨. 토큰 수가 많을수록 비용·시간 증가."},
  {ko:"컨텍스트 창",en:"Context Window",cat:"기초",desc:"AI가 한 번에 처리할 수 있는 최대 토큰 수. Claude의 경우 최대 20만 토큰(약 책 한 권 분량)."},
  {ko:"할루시네이션",en:"Hallucination",cat:"기초",desc:"AI가 사실이 아닌 정보를 자신있게 출력하는 현상. 없는 함수나 라이브러리를 있는 것처럼 코드에 쓰는 경우가 대표적."},
  {ko:"시스템 프롬프트",en:"System Prompt",cat:"기초",desc:"AI의 역할·톤·규칙을 미리 설정하는 숨겨진 지시문. '너는 전문 개발자야'처럼 대화 시작 전에 부여함."},
  {ko:"멀티모달",en:"Multimodal",cat:"기초",desc:"텍스트뿐 아니라 이미지, 오디오, 영상 등 여러 형태의 입력을 처리할 수 있는 AI 능력."},
  {ko:"파운데이션 모델",en:"Foundation Model",cat:"기초",desc:"대규모 데이터로 사전 훈련된 범용 AI 기반 모델. GPT, Claude, Gemini 등이 해당. 다양한 작업에 재활용 가능."},
  {ko:"파인튜닝",en:"Fine-tuning",cat:"기초",desc:"기반 모델을 특정 작업·도메인 데이터로 추가 학습시켜 성능을 높이는 과정."},
  {ko:"RAG",en:"Retrieval-Augmented Generation",cat:"기초",desc:"AI가 외부 데이터베이스에서 관련 정보를 검색한 뒤 답변을 생성하는 방식. 최신 정보 반영 및 환각 감소에 효과적."},
  {ko:"제로샷",en:"Zero-shot",cat:"기초",desc:"예시 없이 AI에게 바로 작업을 요청하는 방식. '이 문장을 영어로 번역해줘'처럼 별도 예시 없이 지시."},
  {ko:"퓨샷",en:"Few-shot",cat:"기초",desc:"몇 가지 예시를 보여준 뒤 같은 패턴으로 작업을 요청하는 방식. 예시가 많을수록 정확도 상승."},
  {ko:"체인오브소트",en:"Chain of Thought (CoT)",cat:"기초",desc:"AI에게 '단계별로 생각해줘'라고 지시해 논리적 추론 과정을 거치게 하는 프롬프트 기법. 복잡한 문제에 효과적."},
  {ko:"온도",en:"Temperature",cat:"기초",desc:"AI 출력의 창의성/무작위성 정도. 0에 가까울수록 결정론적·정확, 1 이상이면 창의적·예측 불가."},
  {ko:"API",en:"Application Programming Interface",cat:"기초",desc:"프로그램끼리 소통하기 위한 약속된 인터페이스. Claude API를 호출하면 앱에서 AI 기능을 쓸 수 있음."},
  {ko:"엔드포인트",en:"Endpoint",cat:"기초",desc:"API 요청을 받는 특정 URL 주소. 예: https://api.anthropic.com/v1/messages"},
  {ko:"SDK",en:"Software Development Kit",cat:"기초",desc:"특정 서비스를 쉽게 사용하도록 도와주는 라이브러리·도구 모음. Anthropic SDK를 쓰면 Claude API를 간단히 연동 가능."},
  {ko:"레이턴시",en:"Latency",cat:"기초",desc:"요청을 보내고 응답이 올 때까지 걸리는 시간. AI 서비스에서는 첫 토큰이 나올 때까지의 시간(TTFT)이 중요."},
  {ko:"스트리밍",en:"Streaming",cat:"기초",desc:"AI 응답이 완성될 때까지 기다리지 않고, 생성되는 즉시 실시간으로 출력하는 방식. ChatGPT의 타이핑 효과가 대표적."},
  {ko:"클라우드",en:"Cloud",cat:"기초",desc:"인터넷을 통해 서버·저장소·소프트웨어를 빌려 쓰는 서비스. AWS, Azure, GCP가 3대 클라우드."},
  {ko:"서버리스",en:"Serverless",cat:"기초",desc:"서버를 직접 관리하지 않고, 함수 단위로 코드를 실행하는 방식. AWS Lambda, Vercel Functions 등."},
  {ko:"오픈소스",en:"Open Source",cat:"기초",desc:"소스 코드를 누구나 볼 수 있고 수정·배포할 수 있는 소프트웨어. GitHub에 공개된 대부분의 프로젝트가 해당."},
  {ko:"버전 관리",en:"Version Control",cat:"기초",desc:"파일 변경 이력을 기록하고 필요 시 이전 상태로 되돌리는 시스템. Git이 사실상 표준."},
  {ko:"디버깅",en:"Debugging",cat:"기초",desc:"코드의 오류(버그)를 찾아 수정하는 과정. 바이브 코딩에서는 오류 메시지를 AI에게 그대로 붙여넣는 것이 기본 전략."},
  {ko:"배포",en:"Deploy",cat:"기초",desc:"개발한 앱을 실제 사용자가 접근할 수 있는 서버(또는 서비스)에 올리는 작업."},
  {ko:"로컬 환경",en:"Local Environment",cat:"기초",desc:"인터넷이 아닌 자신의 컴퓨터에서 코드를 실행하는 개발 환경. '내 PC에서 돌린다'는 뜻."},
  {ko:"프로덕션",en:"Production",cat:"기초",desc:"실제 사용자가 사용하는 실서비스 환경. 반대는 개발(Development) 또는 스테이징(Staging) 환경."},
  {ko:"스택",en:"Stack",cat:"기초",desc:"서비스 개발에 사용되는 기술 조합. 'HTML+CSS+JS+Firebase'처럼 프론트~백엔드까지의 기술 세트."},
  {ko:"리팩토링",en:"Refactoring",cat:"기초",desc:"기능은 그대로 두고 코드 구조를 개선하는 작업. AI에게 '이 코드를 더 깔끔하게 고쳐줘'라고 하면 됨."},
  {ko:"스캐폴딩",en:"Scaffolding",cat:"기초",desc:"프로젝트의 기본 폴더·파일 구조를 자동으로 생성해주는 것. AI에게 '프로젝트 뼈대를 만들어줘'라고 하면 만들어줌."},
  {ko:"이터레이션",en:"Iteration",cat:"기초",desc:"기능을 조금씩 추가하며 반복적으로 개선하는 개발 방식. 바이브 코딩의 핵심 작업 방식."},
  {ko:"보일러플레이트",en:"Boilerplate",cat:"기초",desc:"새 프로젝트 시작 시 반복적으로 쓰이는 기본 코드 템플릿. 재사용 가능한 초기 코드 묶음."},
  {ko:"마이그레이션",en:"Migration",cat:"기초",desc:"데이터나 시스템을 다른 환경·구조로 옮기는 작업. DB 스키마 변경, 플랫폼 이동 등."},
  {ko:"인증",en:"Authentication",cat:"기초",desc:"사용자가 누구인지 확인하는 과정. 로그인, OAuth, JWT 등이 해당."},
  {ko:"인가",en:"Authorization",cat:"기초",desc:"인증된 사용자가 특정 리소스에 접근할 권한이 있는지 확인하는 과정. 인증(Authentication)과 구별해야 함."},
  {ko:"HTTPS",en:"HTTPS",cat:"기초",desc:"데이터를 암호화해 주고받는 보안 통신 프로토콜. 주소창에 자물쇠 아이콘이 표시되면 HTTPS."},
  {ko:"캐싱",en:"Caching",cat:"기초",desc:"자주 쓰는 데이터를 빠른 저장소에 미리 저장해 응답 속도를 높이는 기법."},

// ─── STATE ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'vibe_glossary_v3';
let terms = [];
let activeFilter = '전체';
let sortMode = 'default';

function load() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    terms = JSON.parse(saved);
  } else {
    terms = DEFAULT_TERMS.map((t, i) => ({ ...t, id: i, isNew: false }));
    save();
  }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(terms));
}

function resetToDefault() {
  if (!confirm('기본 용어집으로 초기화하시겠습니까? 추가한 용어가 삭제됩니다.')) return;
  terms = DEFAULT_TERMS.map((t, i) => ({ ...t, id: i, isNew: false }));
  save();
  render();
}

// ─── FILTER / SORT ───────────────────────────────────────────────────────────
const CATS = ['전체', '기초', '도구', '개발', 'AI'];

function setFilter(cat) {
  activeFilter = cat;
  render();
}

function setSort(mode) {
  sortMode = mode;
  ['default', 'ko', 'en'].forEach(m => document.getElementById('sort-' + m).classList.toggle('active', m === mode));
  render();
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let list = terms;
  if (activeFilter !== '전체') list = list.filter(t => t.cat === activeFilter);
  if (q) list = list.filter(t =>
    t.ko.toLowerCase().includes(q) ||
    (t.en || '').toLowerCase().includes(q) ||
    t.desc.toLowerCase().includes(q)
  );
  if (sortMode === 'ko') list = [...list].sort((a, b) => a.ko.localeCompare(b.ko, 'ko'));
  if (sortMode === 'en') list = [...list].sort((a, b) => (a.en || '').localeCompare(b.en || ''));
  return list;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const filtered = getFiltered();
  const grid = document.getElementById('grid');
  const info = document.getElementById('resultsInfo');

  // stat bar
  const total = terms.length;
  const counts = {};
  CATS.slice(1).forEach(c => counts[c] = terms.filter(t => t.cat === c).length);
  document.getElementById('statBar').innerHTML = `
    <div class="stat-chip">전체 <span>${total}</span>개</div>
    ${CATS.slice(1).map(c => `<div class="stat-chip">${c} <span>${counts[c]}</span></div>`).join('')}
  `;

  // filter buttons
  document.getElementById('filterRow').innerHTML = `
    <button class="filter-btn ${activeFilter==='전체'?'active':''}" onclick="setFilter('전체')">전체</button>
    ${CATS.slice(1).map(c => `
      <button class="filter-btn cat-${c} ${activeFilter===c?'active':''}" onclick="setFilter('${c}')">${c}</button>
    `).join('')}
    <button class="filter-btn" onclick="resetToDefault()" style="margin-left:auto;font-size:.72rem;">↩ 초기화</button>
  `;

  info.textContent = `${filtered.length}개 용어 표시 중`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">🔍 검색 결과가 없습니다.</div>';
    return;
  }

  grid.innerHTML = filtered.map(t => `
    <div class="card">
      <div class="card-top">
        <div>
          <div class="term-ko">${t.ko}${t.isNew ? '<span class="new-badge">NEW</span>' : ''}</div>
          ${t.en ? `<div class="term-en">${t.en}</div>` : ''}
        </div>
        <span class="cat-tag cat-${t.cat}">${t.cat}</span>
      </div>
      <div class="desc">${t.desc}</div>
    </div>
  `).join('');
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  ['f-ko','f-en','f-desc'].forEach(id => document.getElementById(id).value = '');
}
function addTerm() {
  const ko = document.getElementById('f-ko').value.trim();
  const en = document.getElementById('f-en').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  const cat = document.getElementById('f-cat').value;
  if (!ko || !desc) { alert('용어와 설명을 입력하세요.'); return; }
  const maxId = terms.reduce((m, t) => Math.max(m, t.id || 0), 0);
  terms.unshift({ id: maxId + 1, ko, en, desc, cat, isNew: true });
  save();
  closeModal();
  activeFilter = '전체';
  render();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
load();
render();
</script>
