<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>바이브 코딩 용어집 v2</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #273549;
    --border: #334155; --accent: #38bdf8; --accent2: #818cf8;
    --text: #e2e8f0; --text-muted: #94a3b8;
    --tag-기초: #0ea5e9; --tag-도구: #a78bfa; --tag-개발: #34d399;
    --tag-AI: #fb923c; --tag-보안: #f87171; --tag-데이터: #facc15;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text);
    font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    min-height: 100vh; padding-bottom: 80px; }
  header {
    background: linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 16px 16px; text-align: center;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: clamp(1.2rem,4vw,1.7rem); font-weight: 800;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }
  .stat-bar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
  .stat-chip { font-size: 0.68rem; padding: 2px 8px; border-radius: 20px;
    border: 1px solid var(--border); color: var(--text-muted); background: var(--surface); }
  .stat-chip span { color: var(--accent); font-weight: 700; }

  .controls { max-width: 800px; margin: 14px auto 0; padding: 0 14px; display: flex; flex-direction: column; gap: 8px; }
  .search-wrap { position: relative; }
  .search-wrap input { width: 100%; padding: 10px 14px 10px 40px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 0.88rem; outline: none; transition: border-color .2s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); pointer-events: none; }

  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-muted); font-size: 0.76rem;
    cursor: pointer; transition: all .18s; white-space: nowrap; }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0f172a; font-weight: 700; }
  .filter-btn.cat-기초.active { background: var(--tag-기초); border-color: var(--tag-기초); }
  .filter-btn.cat-도구.active  { background: var(--tag-도구);  border-color: var(--tag-도구); }
  .filter-btn.cat-개발.active  { background: var(--tag-개발);  border-color: var(--tag-개발); }
  .filter-btn.cat-AI.active    { background: var(--tag-AI);    border-color: var(--tag-AI); color: #0f172a; }
  .filter-btn.cat-보안.active  { background: var(--tag-보안);  border-color: var(--tag-보안); }
  .filter-btn.cat-데이터.active{ background: var(--tag-데이터);border-color: var(--tag-데이터); color: #0f172a; }

  .sort-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .sort-label { font-size: 0.72rem; color: var(--text-muted); }
  .sort-btn { padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-muted); font-size: 0.74rem; cursor: pointer; transition: all .18s; }
  .sort-btn.active { border-color: var(--accent2); color: var(--accent2); }

  .results-info { max-width: 800px; margin: 8px auto 0; padding: 0 14px;
    font-size: 0.74rem; color: var(--text-muted); }

  .grid { max-width: 800px; margin: 10px auto 0; padding: 0 14px;
    display: grid; gap: 8px;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }

  .card { background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
    transition: border-color .2s, transform .15s; }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card-top { display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; margin-bottom: 7px; }
  .term-ko { font-size: 0.95rem; font-weight: 700; color: var(--text); flex: 1; min-width: 100px; }
  .term-en { font-size: 0.73rem; color: var(--text-muted); margin-top: 1px; font-family: monospace; }
  .cat-tag { font-size: 0.64rem; padding: 2px 8px; border-radius: 20px; font-weight: 700; white-space: nowrap; margin-top: 2px; }
  .cat-기초  { background:rgba(14,165,233,.15); color:var(--tag-기초); border:1px solid rgba(14,165,233,.3); }
  .cat-도구  { background:rgba(167,139,250,.15); color:var(--tag-도구); border:1px solid rgba(167,139,250,.3); }
  .cat-개발  { background:rgba(52,211,153,.15);  color:var(--tag-개발); border:1px solid rgba(52,211,153,.3); }
  .cat-AI    { background:rgba(251,146,60,.15);  color:var(--tag-AI);   border:1px solid rgba(251,146,60,.3); }
  .cat-보안  { background:rgba(248,113,113,.15); color:var(--tag-보안); border:1px solid rgba(248,113,113,.3); }
  .cat-데이터{ background:rgba(250,204,21,.15);  color:var(--tag-데이터);border:1px solid rgba(250,204,21,.3); }
  .desc { font-size: 0.81rem; color: var(--text-muted); line-height: 1.55; }

  .fab { position: fixed; bottom: 22px; right: 18px; width: 50px; height: 50px;
    border-radius: 50%; background: linear-gradient(135deg,var(--accent),var(--accent2));
    border: none; color: #0f172a; font-size: 1.4rem; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 18px rgba(56,189,248,.35);
    display: flex; align-items: center; justify-content: center; transition: transform .2s; }
  .fab:hover { transform: scale(1.1); }

  .modal-overlay { display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 22px; width: 100%; max-width: 460px; }
  .modal h2 { font-size: 0.95rem; margin-bottom: 14px; color: var(--accent); }
  .modal label { font-size: 0.76rem; color: var(--text-muted); display: block; margin-bottom: 3px; }
  .modal input, .modal textarea, .modal select {
    width: 100%; padding: 8px 11px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 0.85rem; outline: none; margin-bottom: 10px; }
  .modal textarea { min-height: 75px; resize: vertical; font-family: inherit; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); cursor: pointer; font-size: 0.82rem; }
  .btn-save { padding: 7px 16px; border-radius: 8px; border: none;
    background: var(--accent); color: #0f172a; cursor: pointer; font-size: 0.82rem; font-weight: 700; }
  .empty { text-align: center; padding: 50px 20px; color: var(--text-muted); font-size: 0.88rem; }
  .new-badge { font-size: 0.58rem; background: #fb923c; color: #0f172a;
    padding: 1px 5px; border-radius: 20px; font-weight: 800; margin-left: 4px; vertical-align: middle; }

  .card-actions { display: flex; gap: 5px; margin-top: 8px; justify-content: flex-end; }
  .btn-edit, .btn-del {
    padding: 3px 10px; border-radius: 6px; font-size: 0.72rem;
    cursor: pointer; border: 1px solid var(--border); transition: all .15s; }
  .btn-edit { background: transparent; color: var(--accent); border-color: rgba(56,189,248,.3); }
  .btn-edit:hover { background: rgba(56,189,248,.12); border-color: var(--accent); }
  .btn-del  { background: transparent; color: var(--tag-보안); border-color: rgba(248,113,113,.3); }
  .btn-del:hover  { background: rgba(248,113,113,.12); border-color: var(--tag-보안); }

  .modal h2.edit-mode { color: var(--accent2); }

  @media(max-width:520px){ .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <h1>🧑‍💻 바이브 코딩 용어집</h1>
  <div class="subtitle">IT · AI · 개발 · 보안 · 데이터 필수 용어 사전</div>
  <div class="stat-bar" id="statBar"></div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="용어 검색 (한글 또는 영문)..." oninput="render()">
  </div>
  <div class="filter-row" id="filterRow"></div>
  <div class="sort-row">
    <span class="sort-label">정렬:</span>
    <button class="sort-btn active" onclick="setSort('default')" id="sort-default">기본순</button>
    <button class="sort-btn" onclick="setSort('ko')" id="sort-ko">한글 가나다순</button>
    <button class="sort-btn" onclick="setSort('en')" id="sort-en">영문 ABC순</button>
  </div>
</div>

<div class="results-info" id="resultsInfo"></div>
<div class="grid" id="grid"></div>
<button class="fab" title="새 용어 추가" onclick="openModal()">+</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">➕ 새 용어 추가</h2>
    <label>용어 (한글)</label>
    <input type="text" id="f-ko" placeholder="예: 버그">
    <label>원어 / 영문 (선택)</label>
    <input type="text" id="f-en" placeholder="예: Bug">
    <label>설명</label>
    <textarea id="f-desc" placeholder="설명을 입력하세요..."></textarea>
    <label>카테고리</label>
    <select id="f-cat">
      <option value="기초">기초</option>
      <option value="도구">도구</option>
      <option value="개발">개발</option>
      <option value="AI">AI</option>
      <option value="보안">보안</option>
      <option value="데이터">데이터</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" id="modalSaveBtn" onclick="saveTerm()">저장</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_TERMS = [

// ══════════════════════════════════════════════════════
// 카테고리: 기초
// ══════════════════════════════════════════════════════
{ko:"바이브 코딩",en:"Vibe Coding",cat:"기초",desc:"AI에게 원하는 것을 자연어로 설명하고, 코드를 직접 검토하지 않고 실행 여부로만 판단하는 개발 방식. Andrej Karpathy가 2025년 초 제안한 개념."},
{ko:"프롬프트",en:"Prompt",cat:"기초",desc:"AI에게 전달하는 명령이나 질문 텍스트 전체. '무엇을 만들어줘', '이 코드를 수정해줘'처럼 작업 지시 문장."},
{ko:"컨텍스트",en:"Context",cat:"기초",desc:"AI가 현재 대화에서 참고하는 모든 정보. 이전 대화 내용, 업로드한 파일, 시스템 프롬프트 등이 포함됨."},
{ko:"컨텍스트 창",en:"Context Window",cat:"기초",desc:"AI가 한 번에 처리할 수 있는 최대 토큰 수. Claude의 경우 최대 20만 토큰(약 책 한 권 분량)."},
{ko:"토큰",en:"Token",cat:"기초",desc:"AI가 텍스트를 처리하는 최소 단위. 영어는 단어, 한국어는 음절/형태소 단위. 토큰 수가 많을수록 비용·시간 증가."},
{ko:"할루시네이션",en:"Hallucination",cat:"기초",desc:"AI가 사실이 아닌 정보를 자신있게 출력하는 현상. 없는 함수나 라이브러리를 있는 것처럼 코드에 쓰는 경우가 대표적."},
{ko:"시스템 프롬프트",en:"System Prompt",cat:"기초",desc:"AI의 역할·톤·규칙을 미리 설정하는 지시문. '너는 전문 개발자야'처럼 대화 시작 전에 부여함."},
{ko:"제로샷",en:"Zero-shot",cat:"기초",desc:"예시 없이 AI에게 바로 작업을 요청하는 방식. 별도 예시 없이 지시만으로 결과를 기대."},
{ko:"퓨샷",en:"Few-shot",cat:"기초",desc:"몇 가지 예시를 보여준 뒤 같은 패턴으로 작업을 요청하는 방식. 예시가 많을수록 정확도 상승."},
{ko:"체인오브소트",en:"Chain of Thought (CoT)",cat:"기초",desc:"AI에게 '단계별로 생각해줘'라고 지시해 논리적 추론 과정을 거치게 하는 프롬프트 기법."},
{ko:"온도",en:"Temperature",cat:"기초",desc:"AI 출력의 창의성/무작위성 정도. 0에 가까울수록 결정론적·정확, 1 이상이면 창의적·예측 불가."},
{ko:"멀티모달",en:"Multimodal",cat:"기초",desc:"텍스트뿐 아니라 이미지, 오디오, 영상 등 여러 형태의 입력을 처리할 수 있는 AI 능력."},
{ko:"파운데이션 모델",en:"Foundation Model",cat:"기초",desc:"대규모 데이터로 사전 훈련된 범용 AI 기반 모델. GPT, Claude, Gemini 등. 다양한 작업에 재활용 가능."},
{ko:"파인튜닝",en:"Fine-tuning",cat:"기초",desc:"기반 모델을 특정 작업·도메인 데이터로 추가 학습시켜 성능을 높이는 과정."},
{ko:"RAG",en:"Retrieval-Augmented Generation",cat:"기초",desc:"AI가 외부 DB에서 관련 정보를 검색한 뒤 답변을 생성하는 방식. 최신 정보 반영 및 환각 감소에 효과적."},
{ko:"스트리밍",en:"Streaming",cat:"기초",desc:"AI 응답이 완성될 때까지 기다리지 않고, 생성되는 즉시 실시간으로 출력하는 방식."},
{ko:"API",en:"Application Programming Interface",cat:"기초",desc:"프로그램끼리 소통하기 위한 약속된 인터페이스. Claude API를 호출하면 앱에서 AI 기능을 쓸 수 있음."},
{ko:"엔드포인트",en:"Endpoint",cat:"기초",desc:"API 요청을 받는 특정 URL 주소. 예: https://api.anthropic.com/v1/messages"},
{ko:"SDK",en:"Software Development Kit",cat:"기초",desc:"특정 서비스를 쉽게 사용하도록 도와주는 라이브러리·도구 모음."},
{ko:"레이턴시",en:"Latency",cat:"기초",desc:"요청을 보내고 응답이 올 때까지 걸리는 시간. AI 서비스에서는 첫 토큰 생성까지의 시간(TTFT)이 중요."},
{ko:"클라우드",en:"Cloud",cat:"기초",desc:"인터넷을 통해 서버·저장소·소프트웨어를 빌려 쓰는 서비스. AWS, Azure, GCP가 3대 클라우드."},
{ko:"서버리스",en:"Serverless",cat:"기초",desc:"서버를 직접 관리하지 않고 함수 단위로 코드를 실행하는 방식. AWS Lambda, Vercel Functions 등."},
{ko:"오픈소스",en:"Open Source",cat:"기초",desc:"소스 코드를 누구나 볼 수 있고 수정·배포할 수 있는 소프트웨어."},
{ko:"버전 관리",en:"Version Control",cat:"기초",desc:"파일 변경 이력을 기록하고 이전 상태로 되돌릴 수 있는 시스템. Git이 사실상 표준."},
{ko:"디버깅",en:"Debugging",cat:"기초",desc:"코드의 오류(버그)를 찾아 수정하는 과정. 바이브 코딩에서는 오류 메시지를 AI에게 그대로 붙여넣는 것이 기본 전략."},
{ko:"배포",en:"Deploy",cat:"기초",desc:"개발한 앱을 실제 사용자가 접근할 수 있는 서버에 올리는 작업."},
{ko:"로컬 환경",en:"Local Environment",cat:"기초",desc:"인터넷이 아닌 자신의 컴퓨터에서 코드를 실행하는 개발 환경."},
{ko:"프로덕션",en:"Production",cat:"기초",desc:"실제 사용자가 사용하는 실서비스 환경. 반대는 개발(Development) 또는 스테이징(Staging) 환경."},
{ko:"스테이징",en:"Staging",cat:"기초",desc:"실서비스(프로덕션) 배포 전 최종 테스트를 수행하는 환경. 실서비스와 동일하게 구성."},
{ko:"스택",en:"Stack",cat:"기초",desc:"서비스 개발에 사용되는 기술 조합. 'HTML+CSS+JS+Firebase'처럼 프론트~백엔드까지의 기술 세트."},
{ko:"리팩토링",en:"Refactoring",cat:"기초",desc:"기능은 그대로 두고 코드 구조를 개선하는 작업. AI에게 '이 코드를 더 깔끔하게 고쳐줘'라고 하면 됨."},
{ko:"이터레이션",en:"Iteration",cat:"기초",desc:"기능을 조금씩 추가하며 반복적으로 개선하는 개발 방식. 바이브 코딩의 핵심 작업 방식."},
{ko:"보일러플레이트",en:"Boilerplate",cat:"기초",desc:"새 프로젝트 시작 시 반복적으로 쓰이는 기본 코드 템플릿."},
{ko:"마이그레이션",en:"Migration",cat:"기초",desc:"데이터나 시스템을 다른 환경·구조로 옮기는 작업."},
{ko:"인증",en:"Authentication",cat:"기초",desc:"사용자가 누구인지 확인하는 과정. 로그인, OAuth, JWT 등."},
{ko:"인가",en:"Authorization",cat:"기초",desc:"인증된 사용자가 특정 리소스에 접근할 권한이 있는지 확인하는 과정."},
{ko:"HTTPS",en:"HTTPS",cat:"기초",desc:"데이터를 암호화해 주고받는 보안 통신 프로토콜. 주소창에 자물쇠 아이콘이 표시되면 HTTPS."},

{ko:"풀 리퀘스트",en:"Pull Request (PR)",cat:"기초",desc:"브랜치의 변경 내용을 메인 브랜치에 합치자고 제안하는 것. 코드 리뷰의 핵심 단계."},

{ko:"라우팅",en:"Routing",cat:"기초",desc:"URL 경로에 따라 어떤 화면이나 기능을 보여줄지 결정하는 것."},

{ko:"YAML",en:"YAML",cat:"개발",desc:"들여쓰기로 계층 구조를 표현하는 설정 파일 형식. Docker Compose, GitHub Actions 설정에 사용."},
{ko:"함수",en:"Function",cat:"개발",desc:"특정 작업을 수행하는 재사용 가능한 코드 블록. 입력값(인자)을 받아 결과값을 반환."},
{ko:"클래스",en:"Class",cat:"개발",desc:"객체를 만드는 설계도. 속성(변수)과 행동(함수)을 묶어 정의. 객체지향의 핵심 개념."},
{ko:"상속",en:"Inheritance",cat:"개발",desc:"부모 클래스의 속성과 메서드를 자식 클래스가 물려받는 객체지향 개념."},
{ko:"인터페이스",en:"Interface",cat:"개발",desc:"클래스가 반드시 구현해야 할 메서드를 정의하는 계약. TypeScript, Java 등에서 사용."},
{ko:"컴포넌트",en:"Component",cat:"개발",desc:"UI를 구성하는 독립적이고 재사용 가능한 코드 단위. React에서 버튼, 카드, 폼 등 각각이 컴포넌트."},
{ko:"상태 관리",en:"State Management",cat:"개발",desc:"앱 전체에서 공유되는 데이터(상태)를 효율적으로 관리하는 방법. Redux, Zustand, Jotai 등."},
{ko:"Redux",en:"Redux",cat:"개발",desc:"React 앱의 전역 상태를 중앙에서 관리하는 라이브러리. 복잡한 앱에서 데이터 흐름을 예측 가능하게 함."},
{ko:"Zustand",en:"Zustand",cat:"개발",desc:"Redux보다 가벼운 React 상태 관리 라이브러리. 간단한 API로 빠르게 전역 상태 구현 가능."},
{ko:"훅",en:"Hook",cat:"개발",desc:"React에서 함수형 컴포넌트에 상태·생명주기 등의 기능을 추가하는 함수. useState, useEffect 등."},
{ko:"가상 DOM",en:"Virtual DOM",cat:"개발",desc:"실제 DOM의 메모리 내 복사본. UI 변경 시 가상 DOM을 먼저 업데이트하고 실제 DOM과 비교해 최소한으로만 수정."},
{ko:"웹 컴포넌트",en:"Web Components",cat:"개발",desc:"브라우저 표준 기술로 재사용 가능한 커스텀 HTML 요소를 만드는 방법. 프레임워크 없이 사용 가능."},
{ko:"CRUD",en:"CRUD",cat:"개발",desc:"생성(Create)·조회(Read)·수정(Update)·삭제(Delete). 대부분의 앱이 수행하는 4가지 기본 데이터 작업."},
{ko:"ORM",en:"ORM (Object Relational Mapper)",cat:"개발",desc:"DB 테이블을 코드의 객체로 다룰 수 있게 해주는 도구. SQL 없이도 DB 조작 가능."},
{ko:"SQL",en:"SQL",cat:"개발",desc:"관계형 DB에서 데이터를 조회·수정하는 언어. SELECT, INSERT, UPDATE, DELETE가 핵심."},
{ko:"NoSQL",en:"NoSQL",cat:"개발",desc:"행·열 대신 JSON 문서, 키-값, 그래프 등 유연한 구조로 데이터를 저장하는 DB."},
{ko:"스키마",en:"Schema",cat:"개발",desc:"DB 테이블의 구조 정의. 어떤 컬럼이 있고 어떤 데이터 타입인지 명세."},
{ko:"인덱스",en:"Index",cat:"개발",desc:"DB 검색 속도를 높이기 위해 특정 컬럼에 추가하는 자료구조. 책의 색인과 같은 역할."},
{ko:"트랜잭션",en:"Transaction",cat:"개발",desc:"DB에서 여러 작업을 하나의 단위로 묶어 모두 성공하거나 모두 실패하도록 처리하는 기법. ACID 특성 보장."},
{ko:"ACID",en:"ACID",cat:"개발",desc:"DB 트랜잭션의 4가지 특성: 원자성(Atomicity), 일관성(Consistency), 격리성(Isolation), 지속성(Durability)."},
{ko:"정규화",en:"Normalization",cat:"개발",desc:"DB 설계 시 데이터 중복을 줄이고 무결성을 높이기 위해 테이블을 분리·정리하는 과정."},
{ko:"외래키",en:"Foreign Key",cat:"개발",desc:"다른 테이블의 기본키를 참조해 테이블 간 관계를 정의하는 DB 컬럼."},
{ko:"DOM",en:"Document Object Model",cat:"개발",desc:"HTML 문서를 트리 구조로 표현한 것. JavaScript로 DOM을 조작해 화면을 동적으로 변경."},
{ko:"이벤트 위임",en:"Event Delegation",cat:"개발",desc:"개별 요소에 이벤트를 붙이지 않고 부모 요소 하나에만 붙여 효율적으로 처리하는 패턴."},
{ko:"클로저",en:"Closure",cat:"개발",desc:"함수가 선언될 때의 스코프(범위)를 기억하는 JavaScript의 특성. 비공개 변수 구현 등에 활용."},
{ko:"프로미스",en:"Promise",cat:"개발",desc:"비동기 작업의 완료 또는 실패를 나타내는 객체. .then()과 .catch()로 결과 처리."},
{ko:"async/await",en:"async/await",cat:"개발",desc:"Promise를 더 읽기 쉽게 쓰는 문법. 비동기 코드를 동기 코드처럼 순서대로 작성 가능."},
{ko:"모듈",en:"Module",cat:"개발",desc:"기능별로 분리된 코드 파일. import/export로 다른 파일에서 사용 가능."},
{ko:"번들링",en:"Bundling",cat:"개발",desc:"여러 파일을 하나(또는 소수)의 파일로 합치는 과정. Webpack, Vite 등이 사용됨."},
{ko:"코드 스플리팅",en:"Code Splitting",cat:"개발",desc:"번들을 여러 조각으로 나눠 필요할 때만 로드하는 기법. 초기 로딩 속도 개선에 효과적."},
{ko:"트리 쉐이킹",en:"Tree Shaking",cat:"개발",desc:"사용되지 않는 코드를 번들에서 제거하는 최적화 기법. 파일 크기 감소."},
{ko:"레이지 로딩",en:"Lazy Loading",cat:"개발",desc:"필요한 시점에만 리소스(이미지, 컴포넌트 등)를 로드하는 기법. 초기 성능 개선."},
{ko:"SSR",en:"Server-Side Rendering",cat:"개발",desc:"서버에서 HTML을 완성해 브라우저에 전달하는 방식. 초기 로딩 속도와 SEO에 유리."},
{ko:"SSG",en:"Static Site Generation",cat:"개발",desc:"빌드 시점에 HTML을 미리 생성해두는 방식. 변하지 않는 콘텐츠에 가장 빠른 방법."},
{ko:"ISR",en:"Incremental Static Regeneration",cat:"개발",desc:"Next.js의 기능. SSG 사이트에서 일부 페이지만 주기적으로 재생성해 성능과 최신성을 동시에 확보."},
{ko:"SPA",en:"Single Page Application",cat:"개발",desc:"페이지 전환 없이 단일 HTML 파일에서 동적으로 콘텐츠를 업데이트하는 웹 앱 방식."},
{ko:"PWA",en:"Progressive Web App",cat:"개발",desc:"웹 기술로 만들었지만 앱처럼 설치·작동하는 서비스. 오프라인 지원, 푸시 알림 등 네이티브 기능 제공."},
{ko:"서비스 워커",en:"Service Worker",cat:"개발",desc:"브라우저 백그라운드에서 실행되는 스크립트. 오프라인 캐싱, 푸시 알림, 백그라운드 동기화 처리."},
{ko:"WebAssembly",en:"WebAssembly (WASM)",cat:"개발",desc:"브라우저에서 C, Rust 등의 언어로 작성된 코드를 고속 실행하는 이진 포맷."},
{ko:"SVG",en:"Scalable Vector Graphics",cat:"개발",desc:"벡터 기반 이미지 형식. 크기를 늘려도 깨지지 않아 아이콘·로고·다이어그램에 사용."},
{ko:"Canvas API",en:"Canvas API",cat:"개발",desc:"HTML5에서 JavaScript로 2D 그래픽을 그리는 API. 게임, 차트, 이미지 편집 등에 사용."},
{ko:"WebGL",en:"WebGL",cat:"개발",desc:"브라우저에서 GPU를 활용한 3D 그래픽을 렌더링하는 API. Three.js의 기반 기술."},
{ko:"Three.js",en:"Three.js",cat:"개발",desc:"WebGL을 추상화한 JavaScript 3D 라이브러리. 3D 시각화, 인터랙티브 웹 경험 제작에 사용."},
{ko:"D3.js",en:"D3.js",cat:"개발",desc:"데이터를 기반으로 SVG 시각화를 만드는 JavaScript 라이브러리. 복잡한 데이터 시각화에 적합."},
{ko:"Chart.js",en:"Chart.js",cat:"개발",desc:"간단한 차트(막대, 선, 파이 등)를 쉽게 그리는 JavaScript 라이브러리."},
{ko:"Recharts",en:"Recharts",cat:"개발",desc:"React용 차트 라이브러리. Recharts는 D3 기반으로 React 생태계에서 많이 사용됨."},
{ko:"정규표현식",en:"Regular Expression (Regex)",cat:"개발",desc:"문자열 패턴을 정의하는 언어. 특정 형식의 문자열 검색·검증·치환에 사용."},
{ko:"테스트",en:"Testing",cat:"개발",desc:"코드가 의도대로 작동하는지 검증하는 과정. 단위 테스트, 통합 테스트, E2E 테스트 등."},
{ko:"단위 테스트",en:"Unit Test",cat:"개발",desc:"함수·컴포넌트 등 가장 작은 단위가 올바로 동작하는지 검증하는 테스트."},
{ko:"E2E 테스트",en:"End-to-End Test",cat:"개발",desc:"사용자의 실제 행동 흐름 전체를 자동으로 시뮬레이션하는 테스트. Playwright, Cypress 등."},
{ko:"모킹",en:"Mocking",cat:"개발",desc:"테스트 시 실제 DB나 API 대신 가짜 객체로 대체해 테스트를 격리하는 기법."},
{ko:"CI",en:"Continuous Integration",cat:"개발",desc:"코드를 자주 통합하고 자동으로 빌드·테스트하는 개발 방식. 버그를 초기에 발견 가능."},
{ko:"CD",en:"Continuous Deployment/Delivery",cat:"개발",desc:"테스트를 통과한 코드를 자동으로 프로덕션에 배포하는 방식."},
{ko:"IaC",en:"Infrastructure as Code",cat:"개발",desc:"서버·네트워크 등 인프라 설정을 코드로 정의하고 관리하는 방식. Terraform, Pulumi 등."},
{ko:"로드 밸런싱",en:"Load Balancing",cat:"개발",desc:"여러 서버에 트래픽을 균등하게 분산해 과부하를 방지하는 기술."},
{ko:"수평 확장",en:"Horizontal Scaling",cat:"개발",desc:"같은 사양의 서버를 여러 대 추가하는 방식으로 처리 능력을 높이는 방법."},
{ko:"수직 확장",en:"Vertical Scaling",cat:"개발",desc:"기존 서버의 CPU, 메모리, 스토리지 사양을 높여 처리 능력을 향상시키는 방법."},
{ko:"메시지 큐",en:"Message Queue",cat:"개발",desc:"서비스 간 비동기 통신을 위해 메시지를 임시로 저장하는 중간 버퍼. RabbitMQ, Kafka 등."},
{ko:"이벤트 드리븐",en:"Event-Driven",cat:"개발",desc:"특정 이벤트 발생 시 코드가 실행되는 아키텍처 패턴. 서비스 간 느슨한 결합을 가능하게 함."},
{ko:"디자인 패턴",en:"Design Pattern",cat:"개발",desc:"소프트웨어 개발에서 반복되는 문제에 대한 검증된 해결책. MVC, Singleton, Observer 등."},
{ko:"MVC",en:"MVC (Model-View-Controller)",cat:"개발",desc:"앱을 데이터(Model), 화면(View), 로직(Controller)으로 분리하는 아키텍처 패턴."},
{ko:"SEO",en:"Search Engine Optimization",cat:"개발",desc:"검색 엔진에서 사이트가 상위에 노출되도록 최적화하는 작업. 메타 태그, SSR, 로딩 속도 등이 영향."},
{ko:"접근성",en:"Accessibility (a11y)",cat:"개발",desc:"장애인을 포함한 모든 사용자가 웹·앱을 사용할 수 있도록 설계하는 것. 스크린리더 지원 등."},
{ko:"국제화",en:"Internationalization (i18n)",cat:"개발",desc:"앱을 다국어·다문화 환경에 맞게 설계하는 것. 번역 텍스트, 날짜 형식, 통화 등."},
{ko:"현지화",en:"Localization (l10n)",cat:"개발",desc:"앱을 특정 지역·언어에 맞게 실제로 번역하고 조정하는 과정."},
{ko:"쿠키",en:"Cookie",cat:"개발",desc:"브라우저에 소량의 데이터를 저장하는 방식. 로그인 상태 유지, 사용자 설정 저장 등에 사용."},
{ko:"세션",en:"Session",cat:"개발",desc:"서버에서 사용자의 로그인 상태 등을 유지하는 메커니즘. 세션 ID를 쿠키로 전달."},
{ko:"로컬스토리지",en:"localStorage",cat:"개발",desc:"브라우저에 데이터를 영구적으로 저장하는 기능. 서버 없이 간단한 데이터를 저장할 때 사용."},
{ko:"인덱스드DB",en:"IndexedDB",cat:"개발",desc:"브라우저에 대용량 구조화 데이터를 저장하는 클라이언트 측 DB. localStorage보다 훨씬 큰 데이터 처리 가능."},
{ko:"WASM",en:"WebAssembly",cat:"개발",desc:"브라우저에서 네이티브에 가까운 속도로 실행되는 바이너리 코드 형식. 고성능 웹 앱에 사용."},
{ko:"테일윈드",en:"Tailwind CSS",cat:"개발",desc:"유틸리티 클래스 기반 CSS 프레임워크. 별도 CSS 파일 없이 HTML 클래스로만 스타일링."},
{ko:"CSS 변수",en:"CSS Custom Properties",cat:"개발",desc:"CSS에서 --color-primary처럼 재사용 가능한 값을 정의하는 기능. 다크모드 등 테마 구현에 유용."},
{ko:"플렉스박스",en:"Flexbox",cat:"개발",desc:"CSS 레이아웃 모델. 요소를 행이나 열 방향으로 유연하게 배치하는 방법."},
{ko:"CSS 그리드",en:"CSS Grid",cat:"개발",desc:"행과 열을 동시에 제어하는 2차원 CSS 레이아웃 시스템. 복잡한 레이아웃 구현에 유리."},
{ko:"다크모드",en:"Dark Mode",cat:"개발",desc:"어두운 배경에 밝은 텍스트를 사용하는 UI 테마. prefers-color-scheme 미디어 쿼리로 시스템 설정 감지 가능."},
{ko:"미디어 쿼리",en:"Media Query",cat:"개발",desc:"화면 크기, 해상도 등 기기 특성에 따라 다른 CSS를 적용하는 규칙. 반응형 디자인의 핵심."},
{ko:"폰트 로딩",en:"Font Loading",cat:"개발",desc:"웹 폰트를 효율적으로 불러오는 전략. FOUT, FOIT 현상 방지, display:swap 등 기법 존재."},
{ko:"웹 성능",en:"Web Performance",cat:"개발",desc:"웹 페이지가 빠르게 로드되고 반응하도록 최적화하는 활동. Core Web Vitals 지표로 측정."},
{ko:"Core Web Vitals",en:"Core Web Vitals",cat:"개발",desc:"Google이 정의한 웹 성능 핵심 지표. LCP(로딩), FID(상호작용), CLS(시각적 안정성) 세 가지."},
{ko:"의존성",en:"Dependency",cat:"개발",desc:"내 코드가 작동하기 위해 필요한 외부 패키지. package.json의 dependencies 항목에 기록됨."},
{ko:"시맨틱 버저닝",en:"Semantic Versioning",cat:"개발",desc:"1.2.3처럼 주.부.수 형태로 버전을 표기하는 규칙. 각 숫자의 변경이 변화의 크기를 나타냄."},
{ko:"모노레포",en:"Monorepo",cat:"개발",desc:"여러 프로젝트(패키지)를 하나의 저장소에서 관리하는 방식. Turborepo, Nx 등으로 관리."},
{ko:"린팅",en:"Linting",cat:"개발",desc:"코드의 문법 오류, 스타일 문제를 자동으로 검사하는 과정. ESLint가 대표적."},
{ko:"타입 추론",en:"Type Inference",cat:"개발",desc:"TypeScript가 명시적 타입 선언 없이도 값을 보고 자동으로 타입을 추론하는 기능."},
{ko:"제네릭",en:"Generics",cat:"개발",desc:"타입을 매개변수처럼 사용해 다양한 타입에서 재사용 가능한 코드를 작성하는 방법."},
{ko:"데코레이터",en:"Decorator",cat:"개발",desc:"클래스나 메서드에 메타데이터를 추가하거나 동작을 변경하는 고급 TypeScript/Python 기능."},
{ko:"커링",en:"Currying",cat:"개발",desc:"여러 인수를 받는 함수를 하나씩 인수를 받는 함수들의 체인으로 변환하는 함수형 프로그래밍 기법."},

{ko:"거대 언어 모델",en:"Large Language Model (LLM)",cat:"AI",desc:"방대한 텍스트 데이터로 학습한 AI 모델. GPT, Claude, Gemini 등. 텍스트 생성·이해·번역 등 광범위한 작업 수행."},
{ko:"트랜스포머",en:"Transformer",cat:"AI",desc:"2017년 Google이 발표한 AI 아키텍처. 현재 모든 LLM의 기반. 어텐션 메커니즘으로 문맥을 파악."},
{ko:"어텐션",en:"Attention Mechanism",cat:"AI",desc:"AI가 입력 텍스트에서 어떤 단어가 서로 관련 있는지 가중치를 부여해 문맥을 이해하는 핵심 메커니즘."},
{ko:"임베딩",en:"Embedding",cat:"AI",desc:"단어·문장을 숫자 벡터(좌표)로 변환하는 것. 의미가 비슷한 단어는 벡터 공간에서 가까이 위치."},
{ko:"추론",en:"Inference",cat:"AI",desc:"이미 학습된 AI 모델을 실행해 결과를 얻는 과정."},
{ko:"프롬프트 엔지니어링",en:"Prompt Engineering",cat:"AI",desc:"AI에서 원하는 결과를 얻기 위해 프롬프트를 최적화하는 기술. 명확한 지시, 예시 제공, 역할 부여 등."},
{ko:"에이전트",en:"AI Agent",cat:"AI",desc:"스스로 목표를 세우고 도구를 사용하며 여러 단계를 실행하는 AI 시스템."},
{ko:"멀티에이전트",en:"Multi-Agent",cat:"AI",desc:"여러 AI 에이전트가 역할을 분담해 협업하는 시스템. 복잡한 작업을 병렬 처리 가능."},
{ko:"툴 유스",en:"Tool Use",cat:"AI",desc:"AI가 웹 검색, 코드 실행, 파일 접근 등 외부 도구를 직접 사용하는 능력."},
{ko:"지식 컷오프",en:"Knowledge Cutoff",cat:"AI",desc:"LLM의 학습 데이터가 끝나는 시점. 그 이후의 사건은 모름. Claude의 경우 2025년 8월."},
{ko:"RLHF",en:"RLHF (Reinforcement Learning from Human Feedback)",cat:"AI",desc:"AI 응답에 사람이 좋고 나쁨을 평가해 더 나은 응답을 학습시키는 방법."},

{ko:"벡터 DB",en:"Vector Database",cat:"AI",desc:"텍스트·이미지를 벡터로 변환해 저장·검색하는 DB. RAG 시스템 구현에 필수. Pinecone, Chroma 등."},
{ko:"시맨틱 검색",en:"Semantic Search",cat:"AI",desc:"키워드가 아닌 의미를 기반으로 검색하는 방식."},
{ko:"정렬",en:"Alignment",cat:"AI",desc:"AI의 목표와 행동을 인간의 가치관에 맞추는 것. '잘 정렬된 AI'는 사람이 원하는 대로 안전하게 행동."},
{ko:"에이전틱 AI",en:"Agentic AI",cat:"AI",desc:"단순 응답을 넘어 스스로 계획하고 여러 단계의 작업을 자율 실행하는 AI 방식."},
{ko:"컴퓨터 유스",en:"Computer Use",cat:"AI",desc:"AI가 마우스·키보드를 제어해 컴퓨터를 직접 조작하는 기능."},
{ko:"이미지 생성 AI",en:"Image Generation AI",cat:"AI",desc:"텍스트 설명으로 이미지를 만드는 AI. DALL-E, Midjourney, Stable Diffusion, Flux 등."},
{ko:"텍스트 투 스피치",en:"Text-to-Speech (TTS)",cat:"AI",desc:"텍스트를 음성으로 변환하는 AI 기술. ElevenLabs, OpenAI TTS 등."},
{ko:"음성 인식",en:"Speech-to-Text (STT)",cat:"AI",desc:"음성을 텍스트로 변환하는 AI 기술. OpenAI Whisper가 대표적 오픈소스 모델."},
{ko:"랭체인",en:"LangChain",cat:"AI",desc:"LLM 기반 앱을 만드는 Python/JS 프레임워크. 체인, 에이전트, 메모리 등 고급 기능을 쉽게 구현."},
{ko:"디퓨전 모델",en:"Diffusion Model",cat:"AI",desc:"노이즈에서 점진적으로 이미지를 복원하는 방식으로 그림을 생성하는 AI 모델."},
{ko:"생성형 AI",en:"Generative AI",cat:"AI",desc:"텍스트, 이미지, 음성, 영상 등 새로운 콘텐츠를 스스로 생성하는 AI."},
{ko:"토크나이저",en:"Tokenizer",cat:"AI",desc:"텍스트를 AI가 처리하는 토큰 단위로 분리하는 도구. 한국어는 영어보다 토큰이 많이 소모."},
{ko:"프롬프트 인젝션",en:"Prompt Injection",cat:"AI",desc:"악의적인 텍스트를 입력해 AI의 동작을 조작하려는 공격 기법. AI 앱 보안의 주요 위협."},
{ko:"가드레일",en:"Guardrail",cat:"AI",desc:"AI가 해로운 콘텐츠를 생성하지 못하도록 설정한 안전 제한 장치."},
{ko:"AI 리터러시",en:"AI Literacy",cat:"AI",desc:"AI의 작동 원리, 한계, 활용법을 이해하는 능력. 현대 디지털 시대의 필수 역량."},
{ko:"GPT",en:"GPT (Generative Pre-trained Transformer)",cat:"AI",desc:"OpenAI의 LLM 시리즈. GPT-4o가 현재 최신 버전. ChatGPT의 기반 모델."},
{ko:"라마",en:"Llama",cat:"AI",desc:"Meta의 오픈소스 LLM 시리즈. 무료로 다운로드해 로컬 서버에서 직접 실행 가능."},
{ko:"미스트랄",en:"Mistral",cat:"AI",desc:"프랑스 스타트업 Mistral AI의 오픈소스 LLM. 작은 크기 대비 높은 성능으로 유명."},
{ko:"그록",en:"Grok",cat:"AI",desc:"xAI(Elon Musk)가 만든 LLM. X(트위터) 플랫폼과 통합됨."},
{ko:"코파일럿",en:"GitHub Copilot",cat:"AI",desc:"GitHub·OpenAI가 만든 AI 코딩 보조 도구. 코드 자동 완성, 채팅 기반 코딩 지원."},
{ko:"AI 에이전트 프레임워크",en:"Agent Framework",cat:"AI",desc:"AI 에이전트를 구축하기 위한 도구 모음. LangChain, CrewAI, AutoGen, LangGraph 등."},

{ko:"신경망",en:"Neural Network",cat:"AI",desc:"뇌의 뉴런 구조를 모방한 AI 모델. 입력층, 은닉층, 출력층으로 구성됨."},
{ko:"딥러닝",en:"Deep Learning",cat:"AI",desc:"여러 은닉층을 가진 깊은 신경망을 사용하는 머신러닝 방법. 이미지·음성·텍스트 처리에 강점."},
{ko:"머신러닝",en:"Machine Learning",cat:"AI",desc:"데이터에서 패턴을 학습해 예측이나 결정을 내리는 AI의 한 분야."},

{ko:"강화 학습",en:"Reinforcement Learning",cat:"AI",desc:"환경과 상호작용하며 보상을 최대화하는 방향으로 스스로 학습하는 방식. 게임 AI, 로봇 제어 등."},

{ko:"CNN",en:"Convolutional Neural Network",cat:"AI",desc:"이미지 처리에 특화된 신경망. 이미지 분류, 객체 탐지 등에 사용됨."},

{ko:"LSTM",en:"Long Short-Term Memory",cat:"AI",desc:"장기 의존성 문제를 해결한 RNN의 발전형. 시계열 데이터, 자연어 처리에 사용됨."},
{ko:"자연어 처리",en:"NLP (Natural Language Processing)",cat:"AI",desc:"컴퓨터가 인간의 언어를 이해하고 처리하는 AI 분야. 번역, 감성 분석, 텍스트 생성 등."},
{ko:"감성 분석",en:"Sentiment Analysis",cat:"AI",desc:"텍스트에서 긍정·부정·중립 감성을 파악하는 NLP 기술. 리뷰 분석, 여론 모니터링에 활용."},
{ko:"개체명 인식",en:"NER (Named Entity Recognition)",cat:"AI",desc:"텍스트에서 사람 이름, 장소, 날짜 등 특정 개체를 식별하는 NLP 기술."},
{ko:"요약",en:"Summarization",cat:"AI",desc:"긴 텍스트를 핵심만 남겨 짧게 줄이는 AI 기능. 뉴스 요약, 회의록 정리 등에 활용."},
{ko:"번역",en:"Machine Translation",cat:"AI",desc:"AI가 텍스트를 한 언어에서 다른 언어로 자동 번역하는 기술. Google 번역, DeepL 등."},
{ko:"임베딩 모델",en:"Embedding Model",cat:"AI",desc:"텍스트를 고차원 벡터로 변환하는 전문 모델. OpenAI text-embedding, Cohere Embed 등."},

{ko:"ASI",en:"Artificial Superintelligence",cat:"AI",desc:"인간의 지능을 모든 면에서 뛰어넘는 AI. 아직 이론적 개념이며 실현 여부와 시기가 논쟁 중."},
{ko:"AI 거버넌스",en:"AI Governance",cat:"AI",desc:"AI 개발과 활용에 대한 규칙, 정책, 법률을 수립하고 관리하는 체계."},

{ko:"공정성",en:"Fairness",cat:"AI",desc:"AI가 인종, 성별, 나이 등에 관계없이 모든 사람을 동등하게 대우하도록 하는 AI 윤리 원칙."},
{ko:"설명 가능한 AI",en:"Explainable AI (XAI)",cat:"AI",desc:"AI가 왜 그런 결정을 내렸는지 인간이 이해할 수 있게 설명하는 기술."},

const STORAGE_KEY = 'vibe_glossary_v4';
const CATS = ['전체','기초','도구','개발','AI','보안','데이터'];
let terms = [];
let activeFilter = '전체';
let sortMode = 'default';

function load() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) { terms = JSON.parse(saved); }
  else { terms = DEFAULT_TERMS.map((t,i) => ({...t, id:i, isNew:false})); save(); }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(terms)); }
function resetToDefault() {
  if (!confirm('기본 용어집으로 초기화하시겠습니까? 추가한 용어가 삭제됩니다.')) return;
  terms = DEFAULT_TERMS.map((t,i) => ({...t, id:i, isNew:false})); save(); render();
}
function setFilter(cat) { activeFilter = cat; render(); }
function setSort(mode) {
  sortMode = mode;
  ['default','ko','en'].forEach(m => document.getElementById('sort-'+m).classList.toggle('active', m===mode));
  render();
}
function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let list = activeFilter === '전체' ? terms : terms.filter(t => t.cat === activeFilter);
  if (q) list = list.filter(t =>
    t.ko.toLowerCase().includes(q) || (t.en||'').toLowerCase().includes(q) || t.desc.toLowerCase().includes(q));
  if (sortMode === 'ko') list = [...list].sort((a,b) => a.ko.localeCompare(b.ko,'ko'));
  if (sortMode === 'en') list = [...list].sort((a,b) => (a.en||'').localeCompare(b.en||''));
  return list;
}
function render() {
  const filtered = getFiltered();
  const total = terms.length;
  const counts = {};
  CATS.slice(1).forEach(c => counts[c] = terms.filter(t => t.cat===c).length);
  document.getElementById('statBar').innerHTML =
    `<div class="stat-chip">전체 <span>${total}</span>개</div>` +
    CATS.slice(1).map(c => `<div class="stat-chip">${c} <span>${counts[c]||0}</span></div>`).join('');
  document.getElementById('filterRow').innerHTML =
    `<button class="filter-btn ${activeFilter==='전체'?'active':''}" onclick="setFilter('전체')">전체</button>` +
    CATS.slice(1).map(c =>
      `<button class="filter-btn cat-${c} ${activeFilter===c?'active':''}" onclick="setFilter('${c}')">${c}</button>`
    ).join('') +
    `<button class="filter-btn" onclick="resetToDefault()" style="margin-left:auto;font-size:.68rem;">↩ 초기화</button>`;
  document.getElementById('resultsInfo').textContent = `${filtered.length}개 용어 표시 중`;
  if (filtered.length === 0) {
    document.getElementById('grid').innerHTML = '<div class="empty">🔍 검색 결과가 없습니다.</div>'; return;
  }
  document.getElementById('grid').innerHTML = filtered.map(t => `
    <div class="card">
      <div class="card-top">
        <div>
          <div class="term-ko">${t.ko}${t.isNew?'<span class="new-badge">NEW</span>':''}</div>
          ${t.en?`<div class="term-en">${t.en}</div>`:''}
        </div>
        <span class="cat-tag cat-${t.cat}">${t.cat}</span>
      </div>
      <div class="desc">${t.desc}</div>
      <div class="card-actions">
        <button class="btn-edit" onclick="openEditModal(${t.id})">✏️ 수정</button>
        <button class="btn-del"  onclick="deleteTerm(${t.id})">🗑️ 삭제</button>
      </div>
    </div>`).join('');
}

let editingId = null;

function openModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '➕ 새 용어 추가';
  document.getElementById('modalTitle').className = '';
  ['f-ko','f-en','f-desc'].forEach(id => document.getElementById(id).value='');
  document.getElementById('f-cat').value = '기초';
  document.getElementById('modalOverlay').classList.add('open');
}

function openEditModal(id) {
  const t = terms.find(t => t.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '✏️ 용어 수정';
  document.getElementById('modalTitle').className = 'edit-mode';
  document.getElementById('f-ko').value   = t.ko;
  document.getElementById('f-en').value   = t.en || '';
  document.getElementById('f-desc').value = t.desc;
  document.getElementById('f-cat').value  = t.cat;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function saveTerm() {
  const ko   = document.getElementById('f-ko').value.trim();
  const en   = document.getElementById('f-en').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  const cat  = document.getElementById('f-cat').value;
  if (!ko || !desc) { alert('용어와 설명을 입력하세요.'); return; }

  if (editingId !== null) {
    // 수정 모드
    const idx = terms.findIndex(t => t.id === editingId);
    if (idx !== -1) { terms[idx] = {...terms[idx], ko, en, desc, cat}; }
  } else {
    // 추가 모드
    const maxId = terms.reduce((m,t) => Math.max(m, t.id||0), 0);
    terms.unshift({id: maxId+1, ko, en, desc, cat, isNew: true});
    activeFilter = '전체';
  }
  save(); closeModal(); render();
}

function deleteTerm(id) {
  const t = terms.find(t => t.id === id);
  if (!t) return;
  if (!confirm(`"${t.ko}" 용어를 삭제하시겠습니까?`)) return;
  terms = terms.filter(t => t.id !== id);
  save(); render();
}
load(); render();
</script>
</body>
</html>
